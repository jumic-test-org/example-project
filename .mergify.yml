queue_rules:
  - name: main-queue
    merge_method: squash

pull_request_rules:
  - name: queue jumic labeled PRs
    conditions:
      - base=main
      - "author=jumic"
      - "check-success=Build / lint-typecheck-format"
      - "check-success=Lint PR title / validate"
      - "label=ready-to-merge"
      - "label!=do-not-merge"
    actions:
      queue:
        name: main-queue

  - name: queue external contributor PRs
    conditions:
      - base=main
      - "author!=jumic"
      - "author!=dependabot[bot]"
      - "#approved-reviews-by>=1"
      - "check-success=Build / lint-typecheck-format"
      - "check-success=Lint PR title / validate"
      - "label!=do-not-merge"
    actions:
      queue:
        name: main-queue

  - name: queue dependabot PRs
    conditions:
      - base=main
      - "author=dependabot[bot]"
      - "check-success=Build / lint-typecheck-format"
      - "check-success=Lint PR title / validate"
      - "label!=do-not-merge"
    actions:
      queue:
        name: main-queue
